name: can_engine
description: >-
  Zero-copy CAN engine with C++ Asio event loop and Glaze reflection.
  Dart reads the DisplaySnapshot via Pointer.ref — no copies, no GC.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.7.0

dependencies:
  ffi: ^2.1.4
  can_dbc:
    path: ../can_dbc

dev_dependencies:
  test: ^1.25.8
  lints: ^5.1.1
