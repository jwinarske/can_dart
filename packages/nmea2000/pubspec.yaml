name: nmea2000
description: >-
  NMEA 2000 marine protocol layer on top of package:j1939. Fast Packet
  transport, PGN auto-responder, field-level codec, and marine NAME defaults.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  j1939:
    path: ../j1939
  ffi: ^2.1.0

executables:
  demo:
  marine_sim:

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
