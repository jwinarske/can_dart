name: rv_dashboard
description: >-
  RV-C monitoring and control dashboard. Displays battery, tank, HVAC,
  lighting, and generator status with bidirectional control. Run rv_sim
  on vcan0 for synthetic test data.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  can_codec:
    path: ../../packages/can_codec
  rvc:
    path: ../../packages/rvc
  rvc_bus:
    path: ../../packages/rvc_bus

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
